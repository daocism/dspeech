<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;width:1024px;height:1024px;overflow:hidden}
</style>
</head>
<body>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#04101E"/>
      <stop offset="1" stop-color="#0A1C30"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5BE3FF"/>
      <stop offset="1" stop-color="#2FB8E8"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="7" refY="5"
            markerWidth="4.2" markerHeight="4.2" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#46D7F2"/>
    </marker>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <g transform="translate(512,512) scale(0.93) translate(-512,-512)">

  <!-- control tower, bottom-left -->
  <g transform="translate(265,640) scale(1.18)">
    <!-- antenna -->
    <line x1="0" y1="-300" x2="0" y2="-218" stroke="#E8F1F8" stroke-width="12" stroke-linecap="round"/>
    <circle cx="0" cy="-308" r="13" fill="#46D7F2"/>
    <!-- roof -->
    <rect x="-86" y="-218" width="172" height="26" rx="10" fill="#E8F1F8"/>
    <!-- cab -->
    <polygon points="-96,-192 96,-192 72,-92 -72,-92" fill="#E8F1F8"/>
    <polygon points="-78,-176 78,-176 64,-118 -64,-118" fill="#0A1C30"/>
    <rect x="-58" y="-166" width="116" height="38" rx="8" fill="#46D7F2"/>
    <!-- deck -->
    <rect x="-80" y="-92" width="160" height="18" rx="8" fill="#E8F1F8"/>
    <!-- shaft -->
    <polygon points="-40,-74 40,-74 60,236 -60,236" fill="#E8F1F8"/>
    <rect x="-12" y="-60" width="24" height="280" fill="#0A1C30" opacity="0.25"/>
    <!-- base -->
    <rect x="-84" y="236" width="168" height="30" rx="10" fill="#E8F1F8"/>
  </g>

  <!-- sound waves from the cab toward AI -->
  <g stroke="#46D7F2" stroke-width="22" fill="none" stroke-linecap="round" filter="url(#glow)">
    <path d="M 408 408 A 74 74 0 0 1 408 528"/>
    <path d="M 460 364 A 132 132 0 0 1 460 572"/>
    <path d="M 512 320 A 190 190 0 0 1 512 616"/>
  </g>

  <!-- AI badge, top-right -->
  <g transform="translate(742,300)">
    <rect x="-128" y="-128" width="256" height="256" rx="60"
          fill="#071626" stroke="url(#cyanGlow)" stroke-width="16" filter="url(#glow)"/>
    <text x="0" y="52" text-anchor="middle"
          font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial"
          font-size="150" font-weight="800" fill="#FFFFFF" letter-spacing="4">AI</text>
  </g>

  <!-- half-cycle arrow: AI down to the airplane -->
  <path d="M 854 452 C 922 560 900 668 800 740"
        stroke="#46D7F2" stroke-width="24" fill="none"
        stroke-linecap="round" marker-end="url(#arrowHead)" filter="url(#glow)"/>

  <!-- airplane, bottom-right, nose up-right -->
  <g transform="translate(664,820) rotate(40) scale(1.42)">
    <path d="M0,-95 C12,-95 17,-72 17,-46 L17,-12 L100,34 L100,62 L15,30 L13,62 L38,88 L38,108 L0,96 L-38,108 L-38,88 L-13,62 L-15,30 L-100,62 L-100,34 L-17,-12 L-17,-46 C-17,-72 -12,-95 0,-95 Z"
          fill="#E8F1F8"/>
  </g>
  </g>
</svg>
</body>
</html>
