name: CI

# why: GitHub free plan — 2000 min/month and macOS runners bill at a 10x multiplier. Heavy
# simulator lanes therefore run on pull_request + main only (never per-push on feature
# branches), superseded runs are cancelled, every job is time-capped, and the exhaustive
# zero-flake bar is enforced on the local mac24 gate (full suite, build test) rather than
# hosted runners. Hosted CI is the smoke/regression check, not the quality bar.
#
# Test scope: PR/main run the CORE plan (Dspeech.xctestplan) — main-functionality UI flows
# + page screenshots only. The exotic accessibility/Dynamic-Type/multi-locale sweeps
# (DspeechFull.xctestplan / AccessibilityAuditUITests) are deferred while core features are
# being built; they run on demand via the manual `full-ui-a11y` job (workflow_dispatch). To
# restore the a11y gate on every PR, change that job's trigger back to pull_request/push.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  # why: the full a11y sweep + speaker calibration otherwise run only on manual dispatch or
  # path-filter — a dependency/runner-image drift with no local file change would go
  # unaudited indefinitely. Weekly is enough; the repo is public (standard runners unbilled),
  # and every schedule-skipped job below keeps the PR lanes unchanged.
  schedule:
    - cron: "0 3 * * 1"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: Unit + core UI tests
    if: github.event_name != 'schedule'
    runs-on: macos-26
    timeout-minutes: 45
    env:
      PROJECT: Dspeech.xcodeproj
      SCHEME: Dspeech
      UNIT_RESULT_BUNDLE: UnitTestResults.xcresult
      UI_RESULT_BUNDLE: UITestResults.xcresult
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Select latest Xcode 26
        run: scripts/ci/select-xcode26.sh

      - name: Select iOS simulator
        run: scripts/ci/select-ios-simulator.sh

      # why: Xcode/simulator selection is dynamic (highest 26.x on the runner image), so a
      # silent image bump changes the toolchain with no diff. Persist the resolved versions
      # where they can be compared across runs instead of digging through step logs.
      - name: Record resolved toolchain versions
        run: |
          set -euo pipefail
          {
            echo "## Resolved toolchain"
            echo '```'
            xcodebuild -version
            echo "DEVELOPER_DIR=${DEVELOPER_DIR:-unset}"
            echo "SIMULATOR_DESTINATION=${SIMULATOR_DESTINATION:-unset}"
            sw_vers
            echo '```'
          } | tee toolchain-versions.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload toolchain versions artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: toolchain-versions-${{ github.run_id }}
          path: toolchain-versions.txt
          retention-days: 14

      # why: one job, one build — the previous two-runner split built the identical scheme
      # twice (~2x macOS minutes). Sequential test phases on one runner keep the isolation
      # the split bought (the CPU-heavy real-audio unit tests never run concurrently with
      # XCUITests), without paying for two builds and two simulator boots.
      - name: Build for testing
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$SIMULATOR_DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing

      # why: -test-iterations 2 with -retry-tests-on-failure costs 1x while green (extra
      # iterations run only for failing tests) and absorbs one hosted-runner transient.
      # why: run DspeechTests serially on the hosted runner. The @MainActor-heavy async
      # engine/audio suites (AppleSpeech + AudioSource + the Parakeet EOU suites added in
      # 3123265) all share the one MainActor executor; Swift Testing's default in-process
      # parallelism let them co-schedule and starve each other's drain/poll loops on the
      # CPU-starved runner (a ~1.3s local wait blew past the 30s budget → exit 65). Serial
      # execution removes the contention at the source — assertions and budgets stay strict,
      # no retry/threshold crutch. Verified on mac24: 856 tests pass serially in 13.8s.
      - name: Unit tests (DspeechTests)
        run: |
          set -euo pipefail
          rm -rf "$UNIT_RESULT_BUNDLE"
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$SIMULATOR_DESTINATION" \
            -testPlan Dspeech \
            -only-testing:DspeechTests \
            -test-iterations 2 \
            -retry-tests-on-failure \
            -parallel-testing-enabled NO \
            -resultBundlePath "$UNIT_RESULT_BUNDLE" \
            CODE_SIGNING_ALLOWED=NO \
            test-without-building

      - name: Core UI tests + page screenshots (DspeechUITests)
        run: |
          set -euo pipefail
          rm -rf "$UI_RESULT_BUNDLE"
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$SIMULATOR_DESTINATION" \
            -testPlan Dspeech \
            -only-testing:DspeechUITests \
            -test-iterations 2 \
            -retry-tests-on-failure \
            -resultBundlePath "$UI_RESULT_BUNDLE" \
            CODE_SIGNING_ALLOWED=NO \
            test-without-building

      # why: retry-recovered tests are reported as annotations, not failures — hosted
      # runners are nondeterministically CPU-starved (observed mass false-reds on image
      # rollovers) and red-spam trains the owner to ignore CI. The zero-flake bar (threshold
      # 0, fail on any retry-recover) is enforced on the local mac24 full-suite gate.
      - name: Report test flakes (non-blocking on hosted)
        if: always()
        run: |
          scripts/ci/report-test-flakes.sh "$UNIT_RESULT_BUNDLE" \
            || echo "::warning::Unit lane had retry-recovered tests (see log above)"
          scripts/ci/report-test-flakes.sh "$UI_RESULT_BUNDLE" \
            || echo "::warning::UI lane had retry-recovered tests (see log above)"

      # why: hosted-only failures were previously undebuggable (no artifacts). Failure-only
      # + short retention keeps free-tier artifact storage negligible.
      - name: Upload result bundles on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-results-${{ github.run_id }}
          path: |
            UnitTestResults.xcresult
            UITestResults.xcresult
          retention-days: 3
          if-no-files-found: ignore

  # why: the full accessibility / Dynamic-Type / multi-locale audit sweep is deferred while
  # core features are being built (it boots the simulator many times for text-scaling and
  # contrast checks that aren't the current priority). It runs only on manual dispatch so it
  # stops burning hosted minutes per PR. Re-enable as a PR gate by adding pull_request/push
  # to this job's own `if`, or by making DspeechFull.xctestplan the scheme default.
  full-ui-a11y:
    name: Full UI + a11y sweep (manual + weekly)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: macos-26
    timeout-minutes: 60
    env:
      PROJECT: Dspeech.xcodeproj
      SCHEME: Dspeech
      FULL_RESULT_BUNDLE: FullTestResults.xcresult
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Select latest Xcode 26
        run: scripts/ci/select-xcode26.sh

      - name: Select iOS simulator
        run: scripts/ci/select-ios-simulator.sh

      - name: Record resolved toolchain versions
        run: |
          set -euo pipefail
          {
            echo "## Resolved toolchain"
            echo '```'
            xcodebuild -version
            echo "DEVELOPER_DIR=${DEVELOPER_DIR:-unset}"
            echo "SIMULATOR_DESTINATION=${SIMULATOR_DESTINATION:-unset}"
            sw_vers
            echo '```'
          } | tee toolchain-versions.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Build for testing
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$SIMULATOR_DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing

      - name: Full plan (unit + UI + a11y audits)
        run: |
          set -euo pipefail
          rm -rf "$FULL_RESULT_BUNDLE"
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$SIMULATOR_DESTINATION" \
            -testPlan DspeechFull \
            -test-iterations 2 \
            -retry-tests-on-failure \
            -resultBundlePath "$FULL_RESULT_BUNDLE" \
            CODE_SIGNING_ALLOWED=NO \
            test-without-building

      - name: Upload result bundle on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: full-test-results-${{ github.run_id }}
          path: FullTestResults.xcresult
          retention-days: 3
          if-no-files-found: ignore

  lint-secret-scan:
    name: Swift format and secret scan
    if: github.event_name != 'schedule'
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select latest Xcode 26
        run: scripts/ci/select-xcode26.sh

      - name: Swift format lint
        run: |
          set -euo pipefail
          swift format lint --strict --recursive Dspeech DspeechTests DspeechUITests

      - name: Install pinned gitleaks
        run: |
          set -euo pipefail
          gitleaks_version="8.30.1"
          case "$(uname -m)" in
            arm64) gitleaks_arch="arm64" ;;
            x86_64) gitleaks_arch="x64" ;;
            *) echo "Unsupported macOS architecture for gitleaks: $(uname -m)" >&2; exit 1 ;;
          esac
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          asset="gitleaks_${gitleaks_version}_darwin_${gitleaks_arch}.tar.gz"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${gitleaks_version}"
          curl -fsSL "${base_url}/${asset}" -o "${tmp_dir}/${asset}"
          curl -fsSL "${base_url}/gitleaks_${gitleaks_version}_checksums.txt" -o "${tmp_dir}/checksums.txt"
          grep " ${asset}$" "${tmp_dir}/checksums.txt" > "${tmp_dir}/checksum.txt"
          (
            cd "$tmp_dir"
            shasum -a 256 -c checksum.txt
            tar -xzf "$asset" gitleaks
          )
          mkdir -p "${RUNNER_TEMP}/bin"
          install "${tmp_dir}/gitleaks" "${RUNNER_TEMP}/bin/gitleaks"
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"
          "${RUNNER_TEMP}/bin/gitleaks" version

      - name: Gitleaks history scan
        run: |
          set -euo pipefail
          gitleaks git --redact --verbose .

  release-policy:
    name: Release policy source gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Validate release supply-chain/privacy source policy
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/release/check-release-policy.py
          python3 scripts/release/check-release-policy.py --source-only

  release-archive:
    name: Release archive binary gate
    if: github.event_name != 'schedule'
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Select latest Xcode 26
        run: scripts/ci/select-xcode26.sh

      # why: builds the actual shipping (unsigned) Release archive and runs the BINARY-level gate
      # — the DEBUG speech-probe leak scan, Info.plist export-compliance key, and the
      # privacy-manifest-in-artifact check. These ran only on a developer's mac before; a
      # regression that leaked the probe or broke the encryption key passed CI green. Now it is
      # an automated gate. build-unsigned-archive.sh writes the build stamp the validator verifies.
      - name: Build unsigned Release archive
        run: scripts/release/build-unsigned-archive.sh

      - name: Validate archive supply-chain/privacy policy
        run: |
          set -euo pipefail
          python3 scripts/release/check-release-policy.py \
            --archive tmp/release/Dspeech.xcarchive \
            --stamp tmp/release/Dspeech.xcarchive.dspeech-build-stamp.json

  privacy-manifest:
    name: Privacy manifest validation
    if: github.event_name != 'schedule'
    runs-on: macos-26
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Validate PrivacyInfo.xcprivacy
        run: |
          set -euo pipefail
          test -f Dspeech/PrivacyInfo.xcprivacy
          grep -F "PrivacyInfo.xcprivacy in Resources" Dspeech.xcodeproj/project.pbxproj
          plutil -lint Dspeech/PrivacyInfo.xcprivacy
          python3 - <<'PY'
          import plistlib
          import sys
          from pathlib import Path

          path = Path("Dspeech/PrivacyInfo.xcprivacy")
          manifest = plistlib.loads(path.read_bytes())
          required_root_keys = {
              "NSPrivacyAccessedAPITypes",
              "NSPrivacyCollectedDataTypes",
              "NSPrivacyTracking",
              "NSPrivacyTrackingDomains",
          }
          missing = required_root_keys - manifest.keys()
          if missing:
              raise SystemExit(f"Missing root keys: {sorted(missing)}")
          if manifest["NSPrivacyTracking"] is not False:
              raise SystemExit("NSPrivacyTracking must be false")
          if manifest["NSPrivacyCollectedDataTypes"] != []:
              raise SystemExit("NSPrivacyCollectedDataTypes must be empty")
          if manifest["NSPrivacyTrackingDomains"] != []:
              raise SystemExit("NSPrivacyTrackingDomains must be empty")

          expected_accessed_apis = {
              "NSPrivacyAccessedAPICategoryDiskSpace": {"E174.1"},
              "NSPrivacyAccessedAPICategoryFileTimestamp": {"C617.1"},
              "NSPrivacyAccessedAPICategoryUserDefaults": {"CA92.1"},
          }
          actual_accessed_apis = {}
          for entry in manifest["NSPrivacyAccessedAPITypes"]:
              api_type = entry.get("NSPrivacyAccessedAPIType")
              if api_type in actual_accessed_apis:
                  raise SystemExit(f"Duplicate required-reason API entry: {api_type}")
              actual_accessed_apis[api_type] = set(
                  entry.get("NSPrivacyAccessedAPITypeReasons", [])
              )
          if actual_accessed_apis != expected_accessed_apis:
              raise SystemExit(
                  "Unexpected required-reason API entries: "
                  f"{actual_accessed_apis}"
              )
          PY

  replay-eval:
    name: Offline ATC voice-filter replay eval
    if: github.event_name != 'schedule'
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Select latest Xcode 26
        run: scripts/ci/select-xcode26.sh

      - name: Run offline replay eval (ADR 0008 gate)
        run: |
          set -euo pipefail
          swift run --package-path Dspeech/Tools/ReplayKit dspeech-replay \
            --fixtures DspeechTests/Fixtures/ReplayKit \
            --ground-truth DspeechTests/Fixtures/ReplayKit/ground-truth.json \
            --threshold Dspeech/Tools/ReplayKit/eval-threshold.json
